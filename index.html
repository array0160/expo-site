  <!-- 說明文字 -->
  <div style="max-width:720px;margin:20px auto 0;line-height:1.8;color:#333;">
    <p>
      日治時期明治40年（1907年），依巴爾頓先生生前之建議，
      在今公館小觀音山腳下新店溪畔建取水口，以引取原水；
      在山麓設淨水場，進行淨水處理，再將處理過之清水，
      以抽水機抽送至山上之配水池，藉由重力方式自然流下，
      供應住戶日常用水。
    </p>
